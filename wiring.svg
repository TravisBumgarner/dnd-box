<svg xmlns="http://www.w3.org/2000/svg" width="900" height="660" viewBox="0 0 900 660" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <!-- card background (kept white so it reads in light & dark GitHub themes) -->
  <rect x="0" y="0" width="900" height="660" rx="14" fill="#ffffff" stroke="#d0d7de"/>
  <text x="30" y="42" font-size="22" font-weight="700" fill="#1f2328">DND Cube — wiring (Seeed XIAO ESP32-C6)</text>
  <text x="30" y="66" font-size="13" fill="#57606a">LEDs active-HIGH: GPIO → 330Ω → LED anode, cathode → GND. ADXL345 over I²C (addr 0x53).</text>

  <!-- ================= XIAO board ================= -->
  <rect x="360" y="150" width="180" height="360" rx="12" fill="#20303a" stroke="#0c161c" stroke-width="2"/>
  <rect x="430" y="140" width="40" height="16" rx="3" fill="#3a4a54"/>
  <text x="450" y="135" font-size="11" fill="#57606a" text-anchor="middle">USB-C</text>
  <text x="450" y="335" font-size="15" font-weight="700" fill="#e6edf3" text-anchor="middle" transform="rotate(-90 450 335)">XIAO ESP32-C6</text>

  <!-- left pads (to ADXL) -->
  <g font-size="12" fill="#e6edf3" text-anchor="start">
    <circle cx="360" cy="200" r="5" fill="#e5b93c"/><text x="372" y="204">3V3</text>
    <circle cx="360" cy="245" r="5" fill="#e5b93c"/><text x="372" y="249">GND</text>
    <circle cx="360" cy="290" r="5" fill="#e5b93c"/><text x="372" y="294">D4 · SDA</text>
    <circle cx="360" cy="335" r="5" fill="#e5b93c"/><text x="372" y="339">D5 · SCL</text>
    <circle cx="360" cy="380" r="5" fill="#e5b93c"/><text x="372" y="384">D0 · INT</text>
  </g>
  <!-- right pads (to LEDs) -->
  <g font-size="12" fill="#e6edf3" text-anchor="end">
    <circle cx="540" cy="200" r="5" fill="#e5b93c"/><text x="528" y="204">D7</text>
    <circle cx="540" cy="250" r="5" fill="#e5b93c"/><text x="528" y="254">D8</text>
    <circle cx="540" cy="300" r="5" fill="#e5b93c"/><text x="528" y="304">D9</text>
    <circle cx="540" cy="350" r="5" fill="#e5b93c"/><text x="528" y="354">D10</text>
    <circle cx="540" cy="470" r="5" fill="#e5b93c"/><text x="528" y="474">GND</text>
  </g>
  <!-- battery pads -->
  <g font-size="12" fill="#e6edf3" text-anchor="middle">
    <circle cx="410" cy="510" r="5" fill="#e5b93c"/><text x="410" y="530">BAT+</text>
    <circle cx="490" cy="510" r="5" fill="#e5b93c"/><text x="490" y="530">BAT−</text>
  </g>

  <!-- ================= ADXL345 module ================= -->
  <rect x="60" y="205" width="150" height="175" rx="8" fill="#2d2540" stroke="#171022" stroke-width="2"/>
  <text x="135" y="230" font-size="14" font-weight="700" fill="#e9e2f7" text-anchor="middle">ADXL345</text>
  <g font-size="12" fill="#e9e2f7" text-anchor="start">
    <circle cx="210" cy="252" r="5" fill="#c9b8f0"/><text x="150" y="256" text-anchor="end">VCC</text>
    <circle cx="210" cy="284" r="5" fill="#c9b8f0"/><text x="150" y="288" text-anchor="end">GND</text>
    <circle cx="210" cy="316" r="5" fill="#c9b8f0"/><text x="150" y="320" text-anchor="end">SDA</text>
    <circle cx="210" cy="348" r="5" fill="#c9b8f0"/><text x="150" y="352" text-anchor="end">SCL</text>
    <circle cx="210" cy="372" r="5" fill="#c9b8f0"/><text x="150" y="376" text-anchor="end">INT1</text>
  </g>
  <text x="135" y="400" font-size="10.5" fill="#8a7fb0" text-anchor="middle">CS→VCC · SDO→GND (0x53)</text>

  <!-- ADXL wires -->
  <path d="M210 252 H300 V200 H360" fill="none" stroke="#e5484d" stroke-width="2.5"/>
  <path d="M210 284 H285 V245 H360" fill="none" stroke="#57606a" stroke-width="2.5"/>
  <path d="M210 316 H270 V290 H360" fill="none" stroke="#3f8ae0" stroke-width="2.5"/>
  <path d="M210 348 H255 V335 H360" fill="none" stroke="#1f9e6a" stroke-width="2.5"/>
  <path d="M210 372 H240 V380 H360" fill="none" stroke="#9a5bd6" stroke-width="2.5"/>

  <!-- ================= LEDs ================= -->
  <!-- GND rail for LEDs -->
  <path d="M540 470 H835 V200" fill="none" stroke="#57606a" stroke-width="2.5"/>
  <text x="845" y="205" font-size="11" fill="#57606a">GND</text>

  <!-- helper: pad -> resistor -> LED -> rail. Rows at y=200,250,300,350 -->
  <!-- BLUE (D7) -->
  <path d="M540 200 H610" fill="none" stroke="#3b6fd6" stroke-width="2.5"/>
  <rect x="610" y="192" width="46" height="16" rx="3" fill="#efe4c4" stroke="#b8a97e"/>
  <text x="633" y="204" font-size="9" fill="#6b5d33" text-anchor="middle">330Ω</text>
  <path d="M656 200 H700" fill="none" stroke="#3b6fd6" stroke-width="2.5"/>
  <circle cx="716" cy="200" r="15" fill="#4a7ad9" stroke="#22437f" stroke-width="2"/>
  <path d="M732 200 H835" fill="none" stroke="#57606a" stroke-width="2.5"/>
  <text x="716" y="172" font-size="11" fill="#1f2328" text-anchor="middle">BLUE</text>

  <!-- GREEN (D8) -->
  <path d="M540 250 H610" fill="none" stroke="#1f9e6a" stroke-width="2.5"/>
  <rect x="610" y="242" width="46" height="16" rx="3" fill="#efe4c4" stroke="#b8a97e"/>
  <text x="633" y="254" font-size="9" fill="#6b5d33" text-anchor="middle">330Ω</text>
  <path d="M656 250 H700" fill="none" stroke="#1f9e6a" stroke-width="2.5"/>
  <circle cx="716" cy="250" r="15" fill="#2ea36f" stroke="#155e3f" stroke-width="2"/>
  <path d="M732 250 H835" fill="none" stroke="#57606a" stroke-width="2.5"/>
  <text x="716" y="222" font-size="11" fill="#1f2328" text-anchor="middle">GREEN</text>

  <!-- YELLOW (D9) -->
  <path d="M540 300 H610" fill="none" stroke="#d6a400" stroke-width="2.5"/>
  <rect x="610" y="292" width="46" height="16" rx="3" fill="#efe4c4" stroke="#b8a97e"/>
  <text x="633" y="304" font-size="9" fill="#6b5d33" text-anchor="middle">330Ω</text>
  <path d="M656 300 H700" fill="none" stroke="#d6a400" stroke-width="2.5"/>
  <circle cx="716" cy="300" r="15" fill="#f2c53d" stroke="#a07f13" stroke-width="2"/>
  <path d="M732 300 H835" fill="none" stroke="#57606a" stroke-width="2.5"/>
  <text x="716" y="272" font-size="11" fill="#1f2328" text-anchor="middle">YELLOW</text>

  <!-- RED (D10) -->
  <path d="M540 350 H610" fill="none" stroke="#e5484d" stroke-width="2.5"/>
  <rect x="610" y="342" width="46" height="16" rx="3" fill="#efe4c4" stroke="#b8a97e"/>
  <text x="633" y="354" font-size="9" fill="#6b5d33" text-anchor="middle">330Ω</text>
  <path d="M656 350 H700" fill="none" stroke="#e5484d" stroke-width="2.5"/>
  <circle cx="716" cy="350" r="15" fill="#e5484d" stroke="#8f1f24" stroke-width="2"/>
  <path d="M732 350 H835" fill="none" stroke="#57606a" stroke-width="2.5"/>
  <text x="716" y="322" font-size="11" fill="#1f2328" text-anchor="middle">RED</text>

  <!-- ================= Battery ================= -->
  <rect x="345" y="565" width="200" height="60" rx="8" fill="#1e2b22" stroke="#0d1610" stroke-width="2"/>
  <text x="445" y="590" font-size="13" font-weight="700" fill="#c7f0d5" text-anchor="middle">LiPo battery 3.7V</text>
  <text x="445" y="608" font-size="10.5" fill="#7fae90" text-anchor="middle">charges over USB-C on the cube's bottom face</text>
  <path d="M410 510 V550 H395 V565" fill="none" stroke="#e5484d" stroke-width="2.5"/>
  <path d="M490 510 V550 H495 V565" fill="none" stroke="#57606a" stroke-width="2.5"/>
</svg>
